general {
    hide_cursor = true
}

background {
    path =  /home/kin/.config/hypr/wallpapers/wall1.jpg



    noise = 0.02
    contrast = 1.1
    brightness = 0.9
}

label {
    text = cmd[update:1000] echo "$(date +"%H:%M")"

    color = rgba(230, 235, 245, 1.0)

    font_size = 90
    font_family = JetBrainsMono Nerd Font

    position = 0, 180

    halign = center
    valign = center
}

label {
    text = cmd[update:1000] echo "$(date +"%A, %d %B")"

    color =  rgba(230, 235, 245, 1.0)

    font_size = 20
    font_family = JetBrainsMono Nerd Font

    position = 0, 110

    halign = center
    valign = center
}

input-field {
    size = 280, 55

    outline_thickness = 2

    dots_size = 0.22
    dots_spacing = 0.25

    outer_color = rgba(122, 162, 247, 0.8)
    inner_color = rgba(17, 19, 32, 0.7)

    font_color = rgba(255,255,255,1.0)

    fade_on_empty = false

    rounding = 14

    placeholder_text = Password...

    fail_color = rgba(255, 120, 120, 1.0)

    position = 0, -80

    halign = center
    valign = center
}
